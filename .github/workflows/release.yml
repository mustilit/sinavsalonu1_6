# Sınav Salonu — Otomatik sürüm yayını
#
# main branch'e push olduğunda conventional commits'i tarayarak
# semantic-release ile yeni tag + GitHub Release + CHANGELOG.md güncellemesi
# yapar. Manuel olarak da çalıştırılabilir (workflow_dispatch).
#
# GEREKLİ SECRETS (Settings → Secrets → Actions):
#   GITHUB_TOKEN  (otomatik sağlanır)
#   NPM_TOKEN     (eğer npm publish yapılacaksa — şu an private repo, kullanılmıyor)
#
# Davranış:
#   feat:       MINOR  (1.6.0 → 1.7.0)
#   fix:        PATCH  (1.6.0 → 1.6.1)
#   refactor:   PATCH
#   perf:       PATCH
#   chore(deps):PATCH
#   docs/test/ci/style: tag yok (release etmez)
#   BREAKING CHANGE: MAJOR (1.x → 2.0.0)

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Eğer commit zaten "chore(release):" prefix'liyse infinite loop önle.
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Token'lı checkout — semantic-release commit + tag push edebilsin.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify semantic-release config (dry-run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release
