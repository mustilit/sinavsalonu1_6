name: Lighthouse CI

# Frontend performans + accessibility baseline. Her PR'da ve main push'unda
# kritik sayfalar Lighthouse ile ölçülür; eşiğin altına düşerse PR kırılır.
#
# Threshold:
#   - Performance:    >= 85
#   - Accessibility:  >= 95
#   - Best practices: >= 90 (warning)
#   - SEO:            >= 85 (warning)
#   - LCP:            < 2.5s
#   - CLS:            < 0.1
#   - TBT:            < 300ms

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/lighthouse.yml'
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install deps
        working-directory: apps/frontend
        run: npm ci

      - name: Build
        working-directory: apps/frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run build

      - name: Run Lighthouse CI
        working-directory: apps/frontend
        run: |
          npm install --save-dev --no-save @lhci/cli@^0.14
          npx --no-install lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.sha }}
          path: apps/frontend/.lighthouseci
          retention-days: 30
