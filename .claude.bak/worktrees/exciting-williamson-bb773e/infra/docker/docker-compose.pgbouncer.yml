services:
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: dal
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 25
      RESERVE_POOL_TIMEOUT: 5
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "6432:6432"

  backend:
    environment:
      # Prisma artık PgBouncer üzerinden gidecek
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/dal?schema=public

