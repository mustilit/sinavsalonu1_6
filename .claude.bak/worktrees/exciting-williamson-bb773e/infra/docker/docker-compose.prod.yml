services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sinavsalonu_v2}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    image: dal-backend:prod
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-""}
        HTTPS_PROXY: ${HTTPS_PROXY:-""}
        NO_PROXY: ${NO_PROXY:-"localhost,127.0.0.1,postgres,redis"}
        NPM_REGISTRY: ${NPM_REGISTRY:-"https://registry.npmjs.org"}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3000}
      CLIENT_URL: ${CLIENT_URL}
      REDIS_DISABLED: "0"
      CRON_DISABLED: "0"
      TRUST_PROXY: ${TRUST_PROXY:-"1"}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: dal-backend:prod
    command: npm run start:worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: "redis://redis:6379"
    restart: unless-stopped

  dlq-worker:
    image: dal-backend:prod
    command: npm run start:dlq
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: "redis://redis:6379"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-""}
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-"http://backend:3000"}
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-"http://backend:3000"}
    restart: unless-stopped

volumes:
  db_data:

