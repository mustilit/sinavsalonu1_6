name: Backend CI - Migrate & Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (backend)
        working-directory: apps/backend
        run: npm ci
      - name: Build backend
        working-directory: apps/backend
        run: npm run build
      - name: Run integration tests (self-contained)
        working-directory: apps/backend
        run: npm run test:integration --silent
      - name: Run unit tests (CI with coverage)
        working-directory: apps/backend
        run: npm run test:unit:ci --silent
      - name: Upload prisma migrations artifact
        uses: actions/upload-artifact@v4
        with:
          name: prisma-migrations-${{ github.sha }}
          path: apps/backend/prisma/migrations
      - name: Upload Jest reports & coverage (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-reports-${{ github.sha }}
          path: |
            apps/backend/test-reports
            apps/backend/coverage

  smoke_public_endpoints:
    name: Smoke - public endpoints static checks
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (backend)
        working-directory: apps/backend
        run: npm ci
      - name: Run smoke tests
        working-directory: apps/backend
        run: npm run test:smoke --silent

  e2e_smoke_db:
    name: E2E Smoke (ephemeral Postgres)
    runs-on: ubuntu-latest
    needs: build_test
    services:
      docker:
        image: docker:24.0.6
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Compose (start Postgres)
        run: |
          docker-compose -f infra/docker/docker-compose.ci.yml up -d postgres redis
      - name: Wait for Postgres port
        run: |
          CID=$(docker-compose -f infra/docker/docker-compose.ci.yml ps -q postgres)
          echo "Postgres CID=$CID"
          for i in $(seq 1 60); do
            if docker exec "$CID" pg_isready -U ci_user -d ci_db >/dev/null 2>&1; then
              echo "Postgres is ready"; exit 0
            fi
            echo "Waiting for Postgres... ($i)"; sleep 1
          done
          echo "Postgres failed to become ready"; exit 1
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (backend)
        working-directory: apps/backend
        run: npm ci
      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgresql://ci_user:ci_pass@localhost:5433/ci_db?schema=public" >> $GITHUB_ENV
      - name: Set REDIS_URL
        run: echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
      - name: Prisma generate
        working-directory: apps/backend
        run: npx prisma generate
      - name: Apply migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy
      - name: Build backend
        working-directory: apps/backend
        run: npm run build
      - name: Start backend (CI)
        if: ${{ needs.build_test.result == 'success' }}
        working-directory: apps/backend
        run: npm run start:ci &
      - name: Check build output exists
        if: ${{ needs.build_test.result == 'success' }}
        working-directory: apps/backend
        run: |
          if [ -f dist/nest/main.js ] || [ -f dist/main.js ]; then
            echo "Build output found"
          else
            echo "Build output missing (dist/nest/main.js or dist/main.js)"; ls -la dist || true; exit 1
          fi
      - name: Wait for backend
        if: ${{ needs.build_test.result == 'success' }}
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3001/health >/dev/null 2>&1; then
              echo "Backend up"; exit 0;
            fi
            echo "Waiting for backend... ($i)"; sleep 1;
          done
      - name: Run e2e tests
        if: ${{ needs.build_test.result == 'success' }}
        working-directory: apps/backend
        run: npx jest tests/e2e --runInBand
      - name: Collect logs (on failure)
        if: failure()
        run: |
          mkdir -p /tmp/ci-logs
          docker-compose -f infra/docker/docker-compose.ci.yml logs --no-color > /tmp/ci-logs/docker-compose.log || true
          cd apps/backend || true
          ls -la || true
      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-logs-${{ github.sha }}
          path: /tmp/ci-logs
      - name: Teardown docker-compose
        if: always()
        run: docker-compose -f infra/docker/docker-compose.ci.yml down -v

  migrate_stage2_guard:
    name: Stage2 Preflight Guard
    runs-on: ubuntu-latest
    needs: build_test
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (backend)
        working-directory: apps/backend
        run: npm ci
      - name: Prisma generate
        working-directory: apps/backend
        run: npx prisma generate
      - name: Prisma migrate status (drift check)
        working-directory: apps/backend
        run: npx prisma migrate status --schema=apps/backend/prisma/schema.prisma
      - name: Run Stage2 preflight
        working-directory: apps/backend
        run: npm run db:preflight:stage2

  migrate_deploy:
    name: Stage2 - Deploy Migration (requires environment approval)
    runs-on: ubuntu-latest
    needs: migrate_stage2_guard
    environment: production
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push') }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (backend)
        working-directory: apps/backend
        run: npm ci
      - name: Prisma generate
        working-directory: apps/backend
        run: npx prisma generate
      - name: Deploy migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy

  notify_on_failure:
    name: Notify Slack on failure (optional)
    runs-on: ubuntu-latest
    needs: [build_test, smoke_public_endpoints, migrate_stage2_guard, migrate_deploy]
    if: ${{ needs.build_test.result == 'failure' || needs.smoke_public_endpoints.result == 'failure' || needs.migrate_stage2_guard.result == 'failure' || needs.migrate_deploy.result == 'failure' }}
    steps:
      - name: Send Slack notification (if configured)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TEXT="CI failed for ${REPO}. See run: ${GITHUB_SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          curl -s -X POST -H 'Content-type: application/json' --data "{\"text\":\"${TEXT}\"}" "${SLACK_WEBHOOK_URL}"

