x-redis-env: &redis-env
  REDIS_URL: redis://redis:6379
  REDIS_HOST: redis
  REDIS_PORT: 6379
  DOCKER: "1"
  REDIS_DISABLED: "0"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sinavsalonu_v2}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    image: dal-backend:dev
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *redis-env
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      CLIENT_URL: "http://localhost:5173"
      THROTTLE_DISABLED: "1"
      CRON_DISABLED: ${CRON_DISABLED:-"1"}
      EMAIL_SECRETS_KEY: ${EMAIL_SECRETS_KEY}
      EMAIL_REDIS_QUEUE_PREFIX: ${EMAIL_REDIS_QUEUE_PREFIX:-email}
      EMAIL_TEMPLATE_DIR: ${EMAIL_TEMPLATE_DIR:-src/infrastructure/email/templates}
      EMAIL_DEFAULT_FROM: ${EMAIL_DEFAULT_FROM:-noreply@sinavsalonu.com}
      EMAIL_DEFAULT_FROM_NAME: ${EMAIL_DEFAULT_FROM_NAME:-Sınav Salonu}
      FRONTEND_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health/db && curl -fsS http://localhost:3000/health/redis || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: dal-backend:dev
    command: npm run start:worker
    depends_on:
      redis:
        condition: service_started
    environment:
      <<: *redis-env
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3010:3010"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3010/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  dlq-worker:
    image: dal-backend:dev
    command: npm run start:dlq
    depends_on:
      redis:
        condition: service_started
    environment:
      <<: *redis-env
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-""}
    restart: unless-stopped

  email-traffic-worker:
    image: dal-backend:dev
    command: npm run start:email-traffic-worker
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      <<: *redis-env
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_SECRETS_KEY: ${EMAIL_SECRETS_KEY}
      EMAIL_REDIS_QUEUE_PREFIX: ${EMAIL_REDIS_QUEUE_PREFIX:-email}
      EMAIL_TEMPLATE_DIR: ${EMAIL_TEMPLATE_DIR:-src/infrastructure/email/templates}
      EMAIL_DEFAULT_FROM: ${EMAIL_DEFAULT_FROM:-noreply@sinavsalonu.com}
      EMAIL_DEFAULT_FROM_NAME: ${EMAIL_DEFAULT_FROM_NAME:-Sınav Salonu}
      EMAIL_TRAFFIC_WORKER_PORT: "3011"
      FRONTEND_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "3011:3011"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3011/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-"http://127.0.0.1:3000"}
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-"http://127.0.0.1:3000"}
      CSP_CONNECT_SRC: ${CSP_CONNECT_SRC:-""}
      CSP_SCRIPT_SRC: ${CSP_SCRIPT_SRC:-""}
      CSP_IMG_SRC: ${CSP_IMG_SRC:-""}
      CSP_MEDIA_SRC: ${CSP_MEDIA_SRC:-""}
      CSP_STYLE_SRC: ${CSP_STYLE_SRC:-""}
      CSP_REPORT_ENDPOINT: ${CSP_REPORT_ENDPOINT:-"/csp-report"}
    ports:
      - "5173:5173"
    restart: on-failure

volumes:
  db_data: